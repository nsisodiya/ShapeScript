<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShapeScript Tutorial - Learn 3D Coding</title>
  <meta name="description" content="Learn to generate 3D models with code using ShapeScript — a browser-based parametric CAD scripting tool.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/index.css">
  <style>
    body {
      overflow-y: auto;
      background-color: var(--color-bg-base);
      color: var(--color-text-primary);
      padding: 40px 20px;
    }
    .tutorial-container {
      max-width: 800px;
      margin: 0 auto;
    }
    .tutorial-header {
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 24px;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .tutorial-header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #0369a1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .back-link {
      text-decoration: none;
      font-weight: 600;
      color: var(--color-text-secondary);
      transition: color 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .back-link:hover { color: var(--color-accent-hover); }
    h2 {
      color: #38bdf8;
      font-size: 1.4rem;
      margin-top: 40px;
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(56, 189, 248, 0.15);
      padding-bottom: 6px;
    }
    h3 {
      font-size: 1.1rem;
      margin-top: 24px;
      margin-bottom: 8px;
      color: var(--color-text-primary);
    }
    .sig-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 8px;
    }
    .sig {
      font-family: var(--font-mono);
      font-size: 0.82rem;
      background: rgba(56, 189, 248, 0.10);
      border: 1px solid rgba(56, 189, 248, 0.25);
      color: #38bdf8;
      padding: 2px 10px;
      border-radius: 20px;
    }
    p {
      color: var(--color-text-secondary);
      margin-bottom: 16px;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    code {
      background-color: #1e1e1e;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: #38bdf8;
      border: 1px solid var(--color-border);
    }
    pre {
      background-color: #1a1a1a;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 16px;
      margin: 12px 0 24px 0;
      overflow-x: auto;
    }
    pre code {
      background-color: transparent;
      padding: 0;
      color: #e2e8f0;
      font-size: 0.85rem;
      border: none;
    }
    ul, ol {
      margin-left: 20px;
      margin-bottom: 16px;
      color: var(--color-text-secondary);
    }
    li { margin-bottom: 8px; line-height: 1.5; }
    .highlight-box {
      background-color: rgba(0, 122, 204, 0.08);
      border-left: 4px solid var(--color-accent);
      padding: 16px;
      border-radius: 0 8px 8px 0;
      margin: 20px 0;
    }
    .highlight-box p { margin-bottom: 0; color: var(--color-text-primary); }
    /* Color swatch pill shown next to .color() entry */
    .color-swatches {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="tutorial-container">
    <header class="tutorial-header">
      <div>
        <h1>ShapeScript Tutorial</h1>
        <p style="margin: 4px 0 0 0; color: var(--color-text-muted);">Learn to generate 3D models with code</p>
      </div>
      <a href="/" class="back-link">← Back to Editor</a>
    </header>

    <!--
      The <main> content is rendered dynamically from src/docs/api-docs.js.
      To add or change API documentation, edit that file — do NOT hand-edit this HTML.
    -->
    <main id="tutorial-content">
      <p style="color: var(--color-text-muted);">Loading documentation…</p>
    </main>
  </div>

  <script type="module">
    import { API_DOCS } from '/src/docs/api-docs.js';

    /**
     * Escape HTML entities so raw strings from api-docs.js cannot inject markup
     * unintentionally (except where we deliberately use innerHTML for rich text).
     */
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function renderSection(section) {
      let html = `<h2 id="${section.id}">${esc(section.title)}</h2>`;
      html += `<p>${section.intro}</p>`;  // intro may contain HTML tags

      if (section.highlight) {
        html += `<div class="highlight-box"><p><strong>Note:</strong> ${section.highlight}</p></div>`;
      }

      for (const entry of section.entries) {
        html += `<h3>${esc(entry.name)}</h3>`;

        // Signature badges
        if (entry.signatures && entry.signatures.length > 0) {
          html += `<div class="sig-list">`;
          for (const sig of entry.signatures) {
            html += `<span class="sig">${esc(sig)}</span>`;
          }
          html += `</div>`;
        }

        // Description (may contain <code> tags)
        html += `<p>${entry.description}</p>`;

        // Code example
        if (entry.codeExample) {
          // Escape the raw code text for display inside <pre><code>
          html += `<pre><code>${esc(entry.codeExample)}</code></pre>`;
        }
      }

      return html;
    }

    const main = document.getElementById('tutorial-content');
    main.innerHTML = API_DOCS.map(renderSection).join('\n');
  </script>
</body>
</html>
